<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Powered IDE</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .container {
            display: flex;
            height: 100vh;
        }
        .sidebar {
            width: 30%;
            background-color: #1e1e1e;
            border-right: 1px solid #444;
            padding: 20px;
        }
        .code-area {
            width: 70%;
            display: flex;
            flex-direction: column;
        }
        .editor {
            flex: 1;
            background-color: #252526;
            border: none;
            outline: none;
            padding: 20px;
            font-family: 'Courier New', Courier, monospace;
        }
        .suggestions {
            margin-top: 20px;
            background-color: #303030;
            padding: 10px;
            border-radius: 4px;
        }
        /* Add some retro-futuristic flair */
        @keyframes neon {
            0% { text-shadow: 0 0 5px #0ff; }
            50% { text-shadow: 0 0 20px #0ff, 0 0 30px #0ff; }
            100% { text-shadow: 0 0 5px #0ff; }
        }
        h1 {
            animation: neon 2s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>AI IDE</h1>
            <div class="suggestions">
                <p>Welcome to the AI-powered IDE. Here you can write code with AI assistance.</p>
                <button onclick="generateCode()">Generate Code</button>
                <p id="output"></p>
            </div>
        </div>
        <div class="code-area">
            <textarea class="editor" id="codeEditor" placeholder="Write your code here..."></textarea>
        </div>
    </div>
    <script>
        function generateCode() {
            document.getElementById('output').innerHTML = "AI generating code... (This is a placeholder)";
        }
    </script>
</body>
</html>
